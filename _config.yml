name: Pavel Kuznetsov CV
title: Niritum
author: Niritum
logo: "/assets/images/logo.png"

remote_theme: "mmistakes/jekyll-theme-basically-basic@1.4.5"

plugins:
 - jekyll-remote-theme
 - jekyll-feed
 - jekyll-seo-tag
 - jekyll-sitemap
 - jekyll-paginate
 
 # Front Matter Defaults
defaults:
  # _posts
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      read_time: true
 
paginate: 10  # amount of posts to show per page
paginate_path: /page:num/
